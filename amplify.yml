version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "Static site — no build step needed"
  artifacts:
    baseDirectory: /
    files:
      - index.html
      - "**/*.css"
      - "**/*.js"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.svg"
      - "**/*.ico"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
